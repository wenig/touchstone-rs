name: Revoke smoketest approval

on:
  pull_request_target:
    types: [synchronize]
    branches: [develop]

jobs:
  revoke:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Remove run-smoketest label
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          LABELS=$(gh api repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/labels --jq '.[].name')
          if echo "$LABELS" | grep -q '^run-smoketest$'; then
            gh api --method DELETE repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/labels/run-smoketest
            echo "Label removed — re-review required before smoketest runs again"
          fi
