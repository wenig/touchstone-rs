name: Benchmark

on:
  push:
    branches: [develop]
    paths:
      - "algorithms/**"
  workflow_dispatch:

jobs:
  benchmark:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: dtolnay/rust-toolchain@stable

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"

      - name: Cache cargo registry
        uses: actions/cache@v3
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v3
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v3
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Detect algorithm
        id: detect
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          LABELS=$(gh api repos/${{ github.repository }}/commits/${{ github.sha }}/pulls --jq '.[0].labels[].name' 2>/dev/null || true)
          if echo "$LABELS" | grep -q '^skip-benchmark$'; then
            echo "PR has skip-benchmark label — skipping"
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          DETECTORS=$(git diff HEAD^ HEAD --name-only | grep '^algorithms/' | sed 's|^algorithms/||' | awk -F'/' '{ print $1"/"$2 }' | sort -u)
          COUNT=$(echo "$DETECTORS" | grep -c . || true)
          if [ "$COUNT" -ne 1 ]; then
            echo "Expected exactly 1 algorithm change, got $COUNT — skipping"
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "name=$DETECTORS" >> $GITHUB_OUTPUT
          echo "skip=false" >> $GITHUB_OUTPUT

      - name: Detect detector type
        if: steps.detect.outputs.skip != 'true'
        id: detect_type
        run: |
          DIR="algorithms/${{ steps.detect.outputs.name }}"
          if [ -f "$DIR/Cargo.toml" ]; then
            echo "type=rust" >> $GITHUB_OUTPUT
          elif [ -f "$DIR/pyproject.toml" ]; then
            echo "type=python" >> $GITHUB_OUTPUT
          else
            echo "Error: $DIR contains neither Cargo.toml nor pyproject.toml"
            exit 1
          fi

      - name: Build detector
        if: steps.detect.outputs.skip != 'true'
        run: ./scripts/build-detector.sh ${{ steps.detect.outputs.name }}

      - name: Run detector
        if: steps.detect.outputs.skip != 'true'
        run: ./scripts/run-detector.sh ${{ steps.detect.outputs.name }} benchmark

      - name: Update leaderboard
        if: steps.detect.outputs.skip != 'true'
        run: uv run --with polars --with jinja2 python3 scripts/update-leaderboard.py

      - name: Deploy to GitHub Pages
        if: steps.detect.outputs.skip != 'true'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./leaderboard/dist
          keep_files: true
