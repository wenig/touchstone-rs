name: Smoketest

on:
  pull_request:
    paths:
      - "algorithms/**"
      - ".github/workflows/smoketest.yml"

jobs:
  smoketest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v3
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v3
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v3
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Extract detector name
        run: echo "DETECTOR_NAME=$(./scripts/extract-detector-name.sh)" >> $GITHUB_ENV

      - name: Build detector
        run: ./scripts/build-detector.sh ${{ env.DETECTOR_NAME }}

      - name: Run smoketest
        run: ./scripts/run-detector.sh ${{ env.DETECTOR_NAME }}
        timeout-minutes: 10
